name: 📦 Rust CI

on: [push, pull_request]

jobs:
  build:
    name: 🐧 Build & Test on Linux
    runs-on: ubuntu-latest
    
    # 🔥 增加资源
    env:
      RUST_BACKTRACE: 1
      CARGO_INCREMENTAL: 0  

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # 🔥 优化缓存
      - name: 📦 Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
          cache-target-dir: "true"
          cache-key: "v1-${{ hashFiles('**/Cargo.lock') }}"

      - name: 🚩 Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          libxdo-dev \
          protobuf-compiler \
          libglib2.0-dev \
          libgdk-pixbuf-2.0-dev \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          pkg-config

      # 🔥 只构建必要的 target
      - name: ⛏️ Build
        run: |
          cargo build --locked --release
          # 如果有多个 profile，可以并行构建
          # cargo build --locked --profile ci  # 如果定义了 ci profile

      - name: 🧪 Run tests
        run: cargo test --locked --release -- --nocapture

      # 🔥 改进覆盖率报告
      - name: 📊 Code coverage
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        run: |
          cargo install cargo-tarpaulin
          cargo tarpaulin --workspace --exclude bert_similarity --out Xml --out Html --output-dir ./coverage

      # 🔥 上传多种格式的报告
      - name: 📤 Upload coverage reports
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            ./coverage/
            cobertura.xml
            tarpaulin-report.html
          retention-days: 30

